# ===============================
# DATABASE CONFIGURATION (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/Foodie_DV
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}




spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# HIBERNATE / JPA SETTINGS
# ===============================
# Use 'update' for development; for production, use 'validate' or 'none'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===============================
# CONNECTION POOLING (HikariCP)
# ===============================
# Industry standard for handling high-concurrency food delivery requests
#spring.datasource.hikari.maximum-pool-size=10
#spring.datasource.hikari.minimum-idle=5
#spring.datasource.hikari.idle-timeout=30000
#spring.datasource.hikari.connection-timeout=20000
#spring.datasource.hikari.max-lifetime=1800000

# ===============================
# SERVER CONFIG
# ===============================
server.port=8081
jwt.secret=${JWT_SECRET}
server.error.include-message=always
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
# This will show you exactly which filter is stopping the request

# Expose the health endpoint
management.endpoints.web.exposure.include=health,info

# Show full details (DB status, Disk space) in Production
management.endpoint.health.show-details=always

# Enable Kubernetes-style probes (Render understands these)
management.endpoint.health.probes.enabled=true

