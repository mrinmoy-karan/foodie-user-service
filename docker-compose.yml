version: "3.8"

services:
  mysql:
    image: mysql:8
    container_name: mysql_db_docker
    ports:
      - "3307:3306" # Local Mac uses 3307, Docker internal uses 3306
    environment:
      MYSQL_ROOT_PASSWORD: root@12345
      MYSQL_DATABASE: foodie_db
      MYSQL_USER: foodie_user
      MYSQL_PASSWORD: root@12345 # This is the password for 'foodie_user'
    volumes:
      - ./mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    ports:
      - "8082:80"
    environment:
      PMA_HOST: mysql # Matches the service name above
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    depends_on:
      - mysql

  springboot:
    build: .
    container_name: foodie_user_service
    ports:
      - "8081:8081"
    restart: always # Moved out of environment block
    depends_on:
      - mysql
    environment:
      SERVER_PORT: 8081
      # Use 'mysql' as the host because that is the service name
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/foodie_db?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: foodie_user
      SPRING_DATASOURCE_PASSWORD: root@12345 # MATCHED with mysql service above
      JWT_SECRET: your_very_long_random_safe_secret_key_here_32_chars
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"